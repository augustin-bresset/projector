<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projector</title>
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="stylesheet" href="./style.css" />
  <!-- Three.js hosted locally (web/vendor): works offline. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
  <script type="module" src="./src/app.js"></script>
</head>
<body>
  <div id="app">
    <!-- ======================= top bar ======================= -->
    <header class="topbar">
      <div class="brand">
        <svg class="beam" viewBox="0 0 28 22" width="25" height="19" aria-hidden="true">
          <circle class="reel" cx="7" cy="5.4" r="4.4" />
          <circle class="hub" cx="7" cy="5.4" r="1.2" />
          <circle class="reel small" cx="15.5" cy="7.6" r="2.9" />
          <circle class="hub" cx="15.5" cy="7.6" r="0.9" />
          <rect x="2.5" y="11" width="16" height="8" rx="1" />
          <rect x="18.5" y="13" width="2.4" height="4" />
          <polygon class="light" points="20.9,12.6 27.5,9.2 27.5,20.8 20.9,17.4" />
        </svg>
        Projector
      </div>
      <button id="btn-open" class="tbtn">Open…</button>
      <div class="menu-wrap">
        <button id="btn-transforms" class="tbtn">Transforms</button>
        <div id="transforms-menu" class="menu-dropdown" hidden
             title="Per-frame transforms loaded from your Python scripts — run in memory, never written to the dataset">
          <div class="menu-section">
            <h3>Scripts</h3>
            <div id="scripts-list" class="scripts-list"></div>
            <button id="btn-load-script" class="tbtn">Load script…</button>
          </div>
          <div class="menu-section">
            <h3>Transforms</h3>
            <div id="plugins-list" class="plugins-list"></div>
            <button id="btn-apply-plugins" class="tbtn primary" hidden>Apply</button>
          </div>
        </div>
      </div>
      <div class="spacer"></div>
      <div id="status" class="status"></div>
    </header>

    <!-- ======================= body: rail | workspace ======================= -->
    <div class="body">
      <aside class="rail">
        <section class="panel" id="sequences-panel">
          <h2>Sequences</h2>
          <div id="sequences" class="sequences"></div>
        </section>

        <section class="panel" id="channels-panel">
          <h2>Channels</h2>
          <div id="channels" class="channels"></div>
        </section>

        <section class="panel" id="views-panel">
          <h2>Views</h2>
          <div id="views-menu" class="views-menu"></div>
        </section>

        <section class="panel" id="sync-panel" hidden
                 title="Time model: native event timeline, or every channel resampled onto a reference clock">
          <h2>Time</h2>
          <label class="mode-row">clock
            <select id="sync-ref"></select>
          </label>
          <label class="mode-row" id="sync-tol-row">tolerance
            <input id="sync-tol" type="number" step="0.05" value="0.1" class="opt-num" />
          </label>
          <button id="sync-apply" class="tbtn primary">Apply</button>
        </section>

        <section class="panel" id="bookmarks-panel" hidden>
          <h2>Bookmarks</h2>
          <div id="bookmarks" class="bookmarks"></div>
        </section>

        <section class="panel" id="accum-panel" hidden
                 title="Accumulate past/future frames, registered by pose into the current frame (applies to cloud views)">
          <h2>Accumulate</h2>
          <div class="row">
            <label class="opt">past <input id="accum-back" type="number" min="0" max="25" value="0" class="opt-num" /></label>
            <label class="opt">future <input id="accum-fwd" type="number" min="0" max="25" value="0" class="opt-num" /></label>
          </div>
        </section>

        <section class="panel" id="frames-panel" hidden
                 title="Last event time of each channel (async rigs tick at their own rate)">
          <h2>Frames</h2>
          <div id="frames" class="frames"></div>
        </section>
      </aside>

      <div class="gutter gutter-v" data-gutter="rail"></div>

      <div class="workspace">
        <div class="views" id="views">
          <div class="addbar">
            <select id="add-kind"></select>
            <button id="add-view" class="btn">+ Add view</button>
          </div>
          <div class="views-stack" id="views-stack"></div>
        </div>
        <div id="intermission" hidden>
          <div class="card"><span>Intermission</span><small>no dataset — Open…</small></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <button id="btn-prev" class="tbtn" title="Previous frame (←)">⏮</button>
      <button id="btn-play" class="tbtn" title="Play / pause (space)">▶</button>
      <button id="btn-next" class="tbtn" title="Next frame (→)">⏭</button>
      <label class="speed-wrap" title="Playback speed — type any value">×
        <input id="speed" class="speed" type="number" min="0.1" max="50" step="0.1" value="1" />
      </label>
      <button id="btn-loop-a" class="tbtn" title="Loop start: set to the current frame (again: clear)">A</button>
      <button id="btn-loop-b" class="tbtn" title="Loop end: set to the current frame (again: clear)">B</button>
      <button id="btn-mark" class="tbtn" title="Bookmark the current frame (again: remove)">Mark</button>
      <div class="filmwrap"><input id="frame" type="range" min="0" max="0" value="0" /></div>
      <span id="frame-label" class="muted">frame 1 / 1</span>
    </footer>
  </div>

  <!-- ======================= open dataset (modal) ======================= -->
  <div id="fs-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-head"><span id="fs-title">Open an apairo dataset</span>
        <button id="fs-close" class="icon-btn">✕</button></div>
      <input id="fs-input" class="fs-input" type="text" spellcheck="false"
             placeholder="/path/to/dir   (Enter: go · Tab: complete)" />
      <div id="fs-list" class="fs-list"></div>
      <div id="fs-form" class="fs-form" hidden>
        <div id="fs-ds-name" class="fs-ds-name"></div>
        <div id="fs-channels" class="fs-channels"></div>
        <div class="row">
          <label class="opt">every <input id="fs-every" type="number" step="1" min="1" value="1" class="opt-num" /></label>
          <button id="fs-open" class="tbtn primary">Open dataset</button>
        </div>
      </div>
      <div id="fs-error" class="fs-error"></div>
    </div>
  </div>
</body>
</html>
